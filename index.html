<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieLdle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>MOVIELDLE</h1></header>
    
    <!-- Hint Section -->
    <div id="hint-box">
        <p id="hint-text">Clue: Guess the movie!</p>
    </div>

    <!-- Search/Selection Input Box -->
    <div id="search-container">
        <input type="text" id="movie-search" placeholder="Search for a movie..." autocomplete="off">
        <div id="dropdown-results"></div>
    </div>

    <!-- The Feed where guessed movies pile up infinitely -->
    <div id="guesses-feed"></div>

    <script>
    // Automatically appends a unique timestamp to the script file name
    // This tricks the browser into thinking it's a brand new file on EVERY refresh!
    const script = document.createElement('script');
    script.src = 'script.js?t=' + new Date().getTime();
    document.head.appendChild(script);
    </scr
        ipt>
    
</body>
</html>
