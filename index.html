<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movidle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
    <header><h1>MOVIDLE</h1></header>
    
    <!-- Hint Section -->
    <div id="hint-box">
        <p id="hint-text">Clue: Guess the movie!</p>
    </div>

    <!-- Search/Selection Input Box -->
    <div id="search-container">
        <input type="text" id="movie-search" placeholder="Search for a movie..." autocomplete="off">
        <div id="dropdown-results"></div>
    </div>

    <!-- The Feed where guessed movies pile up infinitely -->
    <div id="guesses-feed"></div>

    <!-- Credits Footer -->
    <div id="credits">
        <p>Created by <a href="https://youtube.com/@gurulegaming?si=CS9CFnswaHhxi3Ky" target="_blank">Gurule Gaming</a></p>
    </div>

  <script src="script.js?v=0.8" defer></script>

    
</body>
</html>
