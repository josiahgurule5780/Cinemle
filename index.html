<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movidle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
    <header><h1>Cinemle</h1></header>

    <button id="endless-btn" class="Endless">Endless Mode 🎲</button>
    
    <div id="hint-box">
        <p id="hint-text">Clue: Loading...</p>
    </div>

    <div id="search-container">
        <input type="text" id="movie-search" placeholder="Search for a movie..." autocomplete="off">
        <div id="dropdown-results"></div>
    </div>

    <div id="guesses-feed"></div>

    <div id="credits">
        <p>Created by Gurule Gaming</p>
    </div>

  <script src="script.js?v=0.8" defer></script>

    
</body>
</html>
